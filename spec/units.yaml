# This file defines units supported in the VSS standard catalog
# See VSS documentation for information on syntax and intended content

# Length

mm:
  definition: Length measured in millimeters
  unit: millimeter
  quantity: length
  allowed-datatypes: ['numeric']
  qudt-unit: http://qudt.org/vocab/unit/MilliM
  qudt-quantity-kind: https://qudt.org/vocab/quantitykind/Length
cm:
  definition: Length measured in centimeters
  unit: centimeter
  quantity: length
  allowed-datatypes: ['numeric']
  qudt-unit: http://qudt.org/vocab/unit/CentiM
  qudt-quantity-kind: https://qudt.org/vocab/quantitykind/Length
m:
  definition: Length measured in meters
  unit: meter
  quantity: length
  allowed-datatypes: ['numeric']
  qudt-unit: http://qudt.org/vocab/unit/M
  qudt-quantity-kind: https://qudt.org/vocab/quantitykind/Length
km:
  definition: Length measured in kilometers
  unit: kilometer
  quantity: length
  allowed-datatypes: ['numeric']
  qudt-unit: http://qudt.org/vocab/unit/KiloM
  qudt-quantity-kind: https://qudt.org/vocab/quantitykind/Length
inch:
  definition: Distance measured in inches
  unit: inch
  quantity: length
  allowed-datatypes: ['numeric']
  qudt-unit: http://qudt.org/vocab/unit/IN
  qudt-quantity-kind: https://qudt.org/vocab/quantitykind/Length

